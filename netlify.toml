# Netlify config for Vite + React
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

# SPA: serve index.html for all routes (optional, for future client-side routing)
[[redirects]]
  from    = "/*"
  to      = "/index.html"
  status  = 200
